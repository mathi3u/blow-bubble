<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Blow Bubble</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 30% 20%, #0e1f3a 0%, #04080f 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    /* Bubble shell */
    #bubble {
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    /* Glass surface + highlight */
    #bubble::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 26%, rgba(255,255,255,0.93) 0%, rgba(255,255,255,0) 26%),
        radial-gradient(circle at 68% 74%, rgba(140,230,255,0.38) 0%, transparent 32%),
        radial-gradient(circle at 50% 50%,
          rgba(180,225,255,0.07) 0%,
          rgba(80,170,255,0.20) 48%,
          rgba(30,110,220,0.08) 78%,
          transparent 100%
        );
      border: 1.5px solid rgba(180,220,255,0.40);
      box-shadow:
        inset 0 0 30px rgba(80,160,255,0.14),
        0 0 60px rgba(80,180,255,0.10),
        0 0 130px rgba(50,130,255,0.06);
    }

    /* Iridescent shimmer ring */
    #bubble::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      background: conic-gradient(
        from 180deg,
        rgba(255,80,180,0.12),
        rgba(80,180,255,0.18),
        rgba(80,255,180,0.12),
        rgba(255,230,60,0.12),
        rgba(255,80,180,0.12)
      );
      mix-blend-mode: screen;
    }

    /* Overlay */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      z-index: 10;
      transition: opacity 0.45s ease;
    }

    #overlay.hidden { opacity: 0; pointer-events: none; }

    #overlay .emoji { font-size: clamp(2.5rem, 14vw, 5rem); }

    #overlay h1 {
      font-size: clamp(1.6rem, 8vw, 2.8rem);
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
    }

    #overlay p {
      color: rgba(255,255,255,0.55);
      font-size: clamp(0.95rem, 4vw, 1.1rem);
    }

    /* Mic status indicator */
    #status {
      position: fixed;
      top: max(1.5rem, env(safe-area-inset-top, 1.5rem));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.45rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #status.visible { opacity: 1; }

    #mic-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #52d882;
      animation: blink 2s ease-in-out infinite;
    }

    #mic-dot.blowing { background: #60b8ff; animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    #status span {
      color: rgba(255,255,255,0.32);
      font-size: 0.72rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    /* Hint text */
    #hint {
      position: fixed;
      bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      white-space: nowrap;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #hint.hidden { opacity: 0; }
  </style>
</head>
<body>

<div id="bubble"></div>

<div id="overlay">
  <div class="emoji">🫧</div>
  <h1>Blow Bubble</h1>
  <p>Tap to start</p>
</div>

<div id="status">
  <div id="mic-dot"></div>
  <span id="status-text">Listening</span>
</div>

<p id="hint">Blow into your phone's mic</p>

<script>
  const bubble  = document.getElementById('bubble');
  const overlay = document.getElementById('overlay');
  const status  = document.getElementById('status');
  const micDot  = document.getElementById('mic-dot');
  const hint    = document.getElementById('hint');

  const MIN_SIZE    = 64;
  const MAX_SIZE    = Math.min(window.innerWidth, window.innerHeight) * 0.82;
  const THRESHOLD   = 0.013;  // RMS level that counts as blowing
  const GROW_RATE   = 7;      // px per animation frame while blowing
  const SHRINK_RATE = 2.5;    // px per frame when silent

  let size    = MIN_SIZE;
  let running = false;
  let analyser, dataArray;

  applySize(MIN_SIZE);

  function applySize(s) {
    bubble.style.width  = s + 'px';
    bubble.style.height = s + 'px';
  }

  function rms(buf) {
    let sq = 0;
    for (let i = 0; i < buf.length; i++) {
      const v = buf[i] / 128 - 1;  // 0-255 byte -> -1..1
      sq += v * v;
    }
    return Math.sqrt(sq / buf.length);
  }

  function tick() {
    if (!running) return;

    analyser.getByteTimeDomainData(dataArray);
    const blowing = rms(dataArray) > THRESHOLD;

    if (blowing) {
      size = Math.min(size + GROW_RATE, MAX_SIZE);
      micDot.classList.add('blowing');
    } else {
      size = Math.max(size - SHRINK_RATE, MIN_SIZE);
      micDot.classList.remove('blowing');
    }

    applySize(size);
    requestAnimationFrame(tick);
  }

  async function start() {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch {
      overlay.querySelector('p').textContent = 'Mic access denied. Please allow and reload.';
      return;
    }

    const ctx    = new (window.AudioContext || window.webkitAudioContext)();
    const source = ctx.createMediaStreamSource(stream);
    analyser     = ctx.createAnalyser();
    analyser.fftSize = 512;
    dataArray    = new Uint8Array(analyser.fftSize);
    source.connect(analyser);

    overlay.classList.add('hidden');
    status.classList.add('visible');
    setTimeout(() => hint.classList.add('hidden'), 4000);

    running = true;
    requestAnimationFrame(tick);
  }

  overlay.addEventListener('click', start);
  // Explicit touchstart for iOS Safari to fire getUserMedia inside gesture
  overlay.addEventListener('touchstart', (e) => { e.preventDefault(); start(); }, { passive: false });
</script>

</body>
</html>
