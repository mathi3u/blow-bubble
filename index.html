  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 30% 20%, #0e1f3a 0%, #04080f 100%);
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── FX canvas ─────────────────────────────────────────── */
    #fx-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* ── Flash ─────────────────────────────────────────────── */
    #flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 51;
      opacity: 0;
    }
    #flash.pop       { animation: flash-pop       0.5s ease-out forwards; }
    #flash.celebrate { animation: flash-celebrate 0.4s ease-out forwards; }
    @keyframes flash-pop       { from { background: #fff; opacity: .65; } to { opacity: 0; } }
    @keyframes flash-celebrate { from { background: gold; opacity: .5;  } to { opacity: 0; } }

    /* ── Slider ─────────────────────────────────────────────── */
    #slider-track {
      display: flex;
      width: 400vw;
      height: 100dvh;
      transition: transform 0.36s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .page {
      width: 100vw;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Bubble ─────────────────────────────────────────────── */
    #bubble {
      border-radius: 50%;
      position: relative;
      flex-shrink: 0;
    }

    #bubble::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 26%, rgba(255,255,255,.93) 0%, rgba(255,255,255,0) 26%),
        radial-gradient(circle at 68% 74%, rgba(140,230,255,.38) 0%, transparent 32%),
        radial-gradient(circle at 50% 50%,
          rgba(180,225,255,.07) 0%,
          rgba(80,170,255,.20) 48%,
          rgba(30,110,220,.08) 78%,
          transparent 100%
        );
      border: 1.5px solid rgba(180,220,255,.40);
      box-shadow:
        inset 0 0 30px rgba(80,160,255,.14),
        0 0 60px  rgba(80,180,255,.10),
        0 0 130px rgba(50,130,255,.06);
      transition: box-shadow 0.4s;
    }

    #bubble.maxed::before {
      box-shadow:
        inset 0 0 40px rgba(80,220,255,.30),
        0 0 80px  rgba(80,220,255,.28),
        0 0 200px rgba(50,200,255,.18);
    }

    #bubble::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      background: conic-gradient(
        from 180deg,
        rgba(255,80,180,.12),
        rgba(80,180,255,.18),
        rgba(80,255,180,.12),
        rgba(255,230,60,.12),
        rgba(255,80,180,.12)
      );
      mix-blend-mode: screen;
    }

    @keyframes bubble-pop {
      0%   { transform: scale(1);    opacity: 1; }
      40%  { transform: scale(1.35); opacity: .9; }
      100% { transform: scale(2);    opacity: 0; }
    }
    #bubble.popping { animation: bubble-pop 0.42s ease-out forwards; }

    /* ── Level badge ─────────────────────────────────────────── */
    #level-badge {
      position: absolute;
      bottom: max(4rem, calc(env(safe-area-inset-bottom) + 3rem));
      font-size: 1.6rem;
      transition: transform 0.2s;
    }

    @keyframes level-up-anim {
      0%   { transform: scale(2.5) translateY(-10px); opacity: 0; }
      35%  { transform: scale(1);  translateY(0);     opacity: 1; }
      100% { opacity: 1; }
    }
    #level-badge.bounce { animation: level-up-anim 0.7s ease-out both; }

    /* ── Celebration overlay ────────────────────────────────── */
    #celebration {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      z-index: 60;
      pointer-events: none;
      opacity: 0;
    }
    #celebration.show {
      opacity: 1;
      animation: cel-enter 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes cel-enter {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    #cel-emoji  { font-size: clamp(4rem, 20vw, 7rem); line-height: 1.1; }
    #cel-title  {
      font-size: clamp(3.5rem, 18vw, 7rem);
      font-weight: 900;
      color: #FFD93D;
      text-shadow: 0 0 40px rgba(255,217,61,.6), 0 0 80px rgba(255,217,61,.3);
      line-height: 1;
    }
    #cel-sub    {
      font-size: clamp(1.1rem, 5.5vw, 1.8rem);
      color: rgba(255,255,255,.85);
      font-weight: 500;
    }

    /* ── Breathe-in hint ─────────────────────────────────────── */
    #breathe-hint {
      position: fixed;
      top: 58%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(180,230,255,.85);
      font-size: clamp(1.1rem, 5vw, 1.6rem);
      font-weight: 500;
      letter-spacing: 0.08em;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s;
      white-space: nowrap;
      pointer-events: none;
    }
    #breathe-hint.show { opacity: 1; }

    /* ── Pinwheel ────────────────────────────────────────────── */
    #pinwheel-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #pinwheel-svg {
      width: min(240px, 58vw);
      height: min(240px, 58vw);
      transform-origin: center;
    }

    #pinwheel-stick {
      width: 5px;
      height: 90px;
      background: linear-gradient(to bottom, #aaa, #555);
      border-radius: 2.5px;
    }

    /* ── Dandelion ───────────────────────────────────────────── */
    #dandelion-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #dandelion-svg {
      width: min(240px, 58vw);
      height: min(240px, 58vw);
    }
    #dandelion-stick {
      width: 5px;
      height: 90px;
      background: linear-gradient(to bottom, #6BCB77, #3a8a45);
      border-radius: 2.5px;
    }

    /* ── Candle ──────────────────────────────────────────────── */
    #candle-scene {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #candle-svg {
      width: min(120px, 32vw);
    }

    /* ── Mode dots ───────────────────────────────────────────── */
    #mode-dots {
      position: fixed;
      bottom: max(1rem, env(safe-area-inset-bottom, 1rem));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.22);
      transition: background .3s;
    }
    .dot.active { background: rgba(255,255,255,.8); }

    /* ── Swipe hint ──────────────────────────────────────────── */
    #swipe-hint {
      position: fixed;
      bottom: max(2.4rem, calc(env(safe-area-inset-bottom) + 1.4rem));
      right: 1.4rem;
      color: rgba(255,255,255,.28);
      font-size: .78rem;
      letter-spacing: .06em;
      z-index: 10;
      transition: opacity .5s;
    }
    #swipe-hint.hidden { opacity: 0; }

    /* ── Overlay ─────────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      z-index: 20;
      transition: opacity .45s ease;
      padding: 2rem;
      text-align: center;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    #overlay .big-emoji { font-size: clamp(2.5rem, 13vw, 4.5rem); margin-bottom: .2rem; }
    #overlay h1 {
      font-size: clamp(1.5rem, 7vw, 2.5rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: -.02em;
    }
    #overlay .sub {
      color: rgba(255,255,255,.55);
      font-size: clamp(.9rem, 3.5vw, 1.05rem);
      margin-top: .2rem;
    }

    /* Mic error state */
    #mic-error {
      display: none;
      background: rgba(255,60,60,.12);
      border: 1px solid rgba(255,100,100,.3);
      border-radius: 1rem;
      padding: 1.2rem 1.4rem;
      margin-top: 1rem;
      max-width: 340px;
      text-align: left;
    }
    #mic-error.visible { display: block; }
    #mic-error h3 {
      color: #ff8080;
      font-size: 1rem;
      margin-bottom: .6rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    #mic-error ol {
      color: rgba(255,255,255,.7);
      font-size: .85rem;
      line-height: 1.7;
      padding-left: 1.2rem;
    }
    #mic-error ol li { margin-bottom: .2rem; }
    #mic-error .platform-note {
      margin-top: .8rem;
      padding-top: .7rem;
      border-top: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.4);
      font-size: .78rem;
    }
    #retry-btn {
      margin-top: 1rem;
      padding: .6rem 1.4rem;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 2rem;
      color: #fff;
      font-size: .9rem;
      cursor: pointer;
      transition: background .2s;
    }
    #retry-btn:hover { background: rgba(255,255,255,.2); }

    /* ── Mic hint ───────────────────────────────────────────── */
    #mic-hint {
      position: fixed;
      bottom: max(4.5rem, calc(env(safe-area-inset-bottom) + 3.5rem));
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.45);
      font-size: .75rem;
      letter-spacing: .07em;
      text-align: center;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.6s;
      pointer-events: none;
      white-space: nowrap;
    }
    #mic-hint.show { opacity: 1; }

    /* ── Status bar ─────────────────────────────────────────── */
    #status-bar {
      position: fixed;
      top: max(1.5rem, env(safe-area-inset-top, 1.5rem));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: .45rem;
      opacity: 0;
      transition: opacity .3s;
      z-index: 10;
    }
    #status-bar.visible { opacity: 1; }

    #mic-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #52d882;
      animation: blink 2s ease-in-out infinite;
    }
    #mic-dot.blowing { background: #60b8ff; animation: none; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

    #status-bar span {
      color: rgba(255,255,255,.30);
      font-size: .72rem;
      letter-spacing: .09em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>
<div id="flash"></div>

<div id="slider-track">

  <!-- ── PAGE 0: Bubble ──────────────────────────────────── -->

  <!-- ── PAGE 1: Pinwheel ────────────────────────────────── -->
  <div class="page" id="pinwheel-page">
    <div id="pinwheel-scene">
      <svg id="pinwheel-svg" viewBox="-50 -50 100 100">

        <path d="M 0 0 L 4 -28 A 30 30 0 0 1 28 -4 Z" fill="#FF6B6B"/>
        <path d="M 0 0 L 4 -28 A 30 30 0 0 1 28 -4 Z" fill="#FFD93D" transform="rotate(90)"/>
        <path d="M 0 0 L 4 -28 A 30 30 0 0 1 28 -4 Z" fill="#6BCB77" transform="rotate(180)"/>

  <div class="page" id="candle-page">

      <!-- viewBox: x -25..25, y -45..70. Origin (0,0) = wick tip / flame pivot -->
      <svg id="candle-svg" viewBox="-25 -45 50 115">
        <g id="flame-group">
          <ellipse cx="0" cy="-16" rx="9"   ry="20" fill="#FF8C00" opacity="0.9"/>
          <ellipse cx="0" cy="-14" rx="5"   ry="14" fill="#FFD700"/>

        </g>
        <!-- Wick -->
        <line x1="0" y1="0" x2="0" y2="8" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Candle body -->
        <rect x="-15" y="9" width="30" height="56" rx="4" fill="#a0c4ff"/>
        <ellipse cx="0" cy="9" rx="15" ry="2.5" fill="#c2d8ff"/>
        <line x1="-15" y1="28" x2="15" y2="28" stroke="rgba(255,255,255,.22)" stroke-width="1"/>
        <line x1="-15" y1="47" x2="15" y2="47" stroke="rgba(255,255,255,.22)" stroke-width="1"/>
      </svg>

</div>

<!-- Mode dots -->
<div id="mode-dots">

<div id="overlay">

<script>
// ── Elements ────────────────────────────────────────────────────
const fxCanvas     = document.getElementById('fx-canvas');
const fxCtx        = fxCanvas.getContext('2d');
const flashEl      = document.getElementById('flash');
const sliderTrack  = document.getElementById('slider-track');
const bubbleEl     = document.getElementById('bubble');
const levelBadge   = document.getElementById('level-badge');
const pinwheelSvg  = document.getElementById('pinwheel-svg');
const modeDots     = document.querySelectorAll('.dot');
const swipeHint    = document.getElementById('swipe-hint');
const celebrationEl = document.getElementById('celebration');
const celTitle      = document.getElementById('cel-title');
const celSub        = document.getElementById('cel-sub');
const breatheHint  = document.getElementById('breathe-hint');
const overlay      = document.getElementById('overlay');
const micError     = document.getElementById('mic-error');
const micSteps     = document.getElementById('mic-steps');
const platformNote = document.getElementById('platform-note');
const retryBtn     = document.getElementById('retry-btn');
const statusBar    = document.getElementById('status-bar');
const micDot       = document.getElementById('mic-dot');
const micHint      = document.getElementById('mic-hint');

// ── Canvas resize ──────────────────────────────────────────────
function resizeCanvas() {
  fxCanvas.width  = window.innerWidth;
  fxCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Audio ──────────────────────────────────────────────────────
let analyser, dataArray, freqData;
let smoothedRMS = 0;
const RMS_SMOOTH = 0.82;

function getRMS(buf) {
  let sq = 0;
  for (let i = 0; i < buf.length; i++) {
    const v = buf[i] / 128 - 1;
    sq += v * v;
  }
  return Math.sqrt(sq / buf.length);
}

// Blowing = high amplitude AND broadband spectrum (energy across many bins).
// Speech/music has harmonic peaks (narrow bins); ambient is low amplitude.
// Bins 2-58 ≈ 170Hz-5kHz with fftSize 512 @ 44.1kHz.
function isBlowing(rms, freq) {
  if (rms < 0.030) return false;
  let active = 0;
  for (let i = 2; i <= 58; i++) { if (freq[i] > 60) active++; }
  return active >= 10;
}

// ── Confetti ───────────────────────────────────────────────────
const CONFETTI_COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#F093FB','#FDB96D','#A8EDEA','#FF9A9E'];
let particles = [];

function burst(cx, cy, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 14 + 4;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 6,
      color: CONFETTI_COLORS[i % CONFETTI_COLORS.length],
      w: Math.random() * 10 + 5,
      h: Math.random() * 6 + 3,
      rot:   Math.random() * 360,
      rotV:  (Math.random() - 0.5) * 14,
      alpha: 1,
      decay: Math.random() * 0.01 + 0.007,
      gravity: 0.35,
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.alpha > 0);
  for (const p of particles) {
    p.x   += p.vx;
    p.y   += p.vy;
    p.vy  += p.gravity;
    p.vx  *= 0.99;
    p.rot += p.rotV;
    p.alpha -= p.decay;
  }
}

function drawParticles() {
  for (const p of particles) {
    fxCtx.save();
    fxCtx.globalAlpha = Math.max(0, p.alpha);
    fxCtx.fillStyle = p.color;
    fxCtx.translate(p.x, p.y);
    if (p.isCircle) {
      fxCtx.beginPath();
      fxCtx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
      fxCtx.fill();
    } else {
      fxCtx.rotate(p.rot * Math.PI / 180);
      fxCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    }
    fxCtx.restore();
  }
}

// ── Flash helper ───────────────────────────────────────────────
function triggerFlash(type) {
  flashEl.className = '';
  void flashEl.offsetWidth;
  flashEl.className = type;
}

// ── Swipe / Mode switching ─────────────────────────────────────
let currentPage  = 0;
let touchStartX  = 0;
let touchStartY  = 0;

function switchPage(page) {
  if (page === currentPage) return;
  currentPage = page;
  sliderTrack.style.transform = `translateX(${-page * 100}vw)`;
  modeDots.forEach((d, i) => d.classList.toggle('active', i === page));
  swipeHint.textContent = page === 0 ? 'swipe ›' : page === 3 ? '‹ swipe' : '‹ swipe ›';
  if      (page === 0) resetBubble();
  else if (page === 1) resetPinwheel();
  else if (page === 2) initDandelion();
  else if (page === 3) resetCandle();
  if (window.posthog) posthog.capture('mode_switch', { mode: page });
}

document.addEventListener('touchstart', e => {
  if (e.target.closest('#overlay')) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (e.target.closest('#overlay')) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
  if (Math.abs(dx) > 55 && dy < 80) {
    switchPage(dx < 0 ? Math.min(currentPage + 1, 3) : Math.max(currentPage - 1, 0));
  }
}, { passive: true });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') switchPage(Math.min(currentPage + 1, 3));
  if (e.key === 'ArrowLeft')  switchPage(Math.max(currentPage - 1, 0));
});

// ── Bubble state ───────────────────────────────────────────────
const MIN_BUBBLE = 64;
const MAX_BUBBLE = Math.min(window.innerWidth, window.innerHeight) * 0.80;

const GROW_ACCEL      = 0.6;
const GROW_MAX_VEL    = 10;
const DEFLATE_ACCEL   = 1.0;
const DEFLATE_MAX_VEL = -5;

const LEVEL_HOLD_MS = [800, 1500, 2700];
const LEVEL_STARS   = ['⭐', '⭐⭐', '⭐⭐⭐'];

let bubbleSize   = MIN_BUBBLE;
let bubbleVel    = 0;
let bubbleState  = 'idle';   // idle | maxed | popping | celebrating | breathing
let holdMs       = 0;
let holdProgress = 0;
let currentLevel = 0;
let breatheInMs  = 0;
const BREATHE_DURATION = 2800; // ms of breathe-in phase

function applyBubbleSize(s) {
  bubbleEl.style.width  = s + 'px';
  bubbleEl.style.height = s + 'px';
}
applyBubbleSize(MIN_BUBBLE);

function resetBubble() {
  bubbleSize   = MIN_BUBBLE;
  bubbleVel    = 0;
  bubbleState  = 'idle';
  holdMs       = 0;
  holdProgress = 0;
  bubbleEl.classList.remove('popping', 'maxed');
  applyBubbleSize(MIN_BUBBLE);
}

function popBubble() {
  bubbleState = 'popping';
  bubbleEl.classList.add('popping');
  bubbleEl.classList.remove('maxed');

  const r = bubbleEl.getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + r.height / 2, 140);
  triggerFlash('pop');

  // Show celebration overlay
  bubbleState = 'celebrating';
  celTitle.textContent = 'YAY!';
  celSub.textContent   = 'You did it!';
  celebrationEl.classList.remove('show');
  void celebrationEl.offsetWidth;
  celebrationEl.classList.add('show');
  if (window.posthog) posthog.capture('bubble_pop', { level: currentLevel });

  setTimeout(() => {
    // Hide celebration, advance level
    celebrationEl.classList.remove('show');

    currentLevel = (currentLevel + 1) % LEVEL_HOLD_MS.length;
    levelBadge.textContent = LEVEL_STARS[currentLevel];
    levelBadge.classList.remove('bounce');
    void levelBadge.offsetWidth;
    levelBadge.classList.add('bounce');

    // Reset bubble to min size
    bubbleEl.classList.remove('popping');
    bubbleSize = MIN_BUBBLE;
    bubbleVel  = 0;
    holdMs = holdProgress = 0;
    applyBubbleSize(MIN_BUBBLE);

    // Breathe-in phase
    bubbleState = 'breathing';
    breatheInMs = 0;
    breatheHint.classList.add('show');

    setTimeout(() => {
      breatheHint.classList.remove('show');
      levelBadge.classList.remove('bounce');
      bubbleState = 'idle';
    }, BREATHE_DURATION);

  }, 1600);
}

function drawBreatheInRings() {
  const cx = window.innerWidth  / 2;
  const cy = window.innerHeight / 2;
  const cycleMs = BREATHE_DURATION / 3;          // 3 pulses
  const t  = (breatheInMs % cycleMs) / cycleMs; // 0→1 per pulse
  const baseR = MIN_BUBBLE / 2 + 8;

  fxCtx.save();
  fxCtx.strokeStyle = `rgba(150,220,255,${(1 - t) * 0.65})`;
  fxCtx.lineWidth = 3 + (1 - t) * 3;
  fxCtx.beginPath();
  fxCtx.arc(cx, cy, baseR + t * 65, 0, Math.PI * 2);
  fxCtx.stroke();
  fxCtx.restore();
}

function updateBubble(dt, blowing) {
  if (bubbleState === 'popping' || bubbleState === 'celebrating' || bubbleState === 'breathing') return;

  if (blowing) {
    bubbleVel = Math.min(bubbleVel + GROW_ACCEL, GROW_MAX_VEL);
  } else {
    bubbleVel = Math.max(bubbleVel - DEFLATE_ACCEL, DEFLATE_MAX_VEL);
  }

  bubbleSize = Math.max(MIN_BUBBLE, Math.min(bubbleSize + bubbleVel, MAX_BUBBLE));
  if (bubbleSize <= MIN_BUBBLE || bubbleSize >= MAX_BUBBLE) bubbleVel = 0;
  applyBubbleSize(bubbleSize);

  if (bubbleSize >= MAX_BUBBLE - 1) {
    bubbleEl.classList.add('maxed');
    holdMs += dt;
    holdProgress = Math.min(holdMs / LEVEL_HOLD_MS[currentLevel], 1);
    if (holdMs >= LEVEL_HOLD_MS[currentLevel]) popBubble();
  } else {
    bubbleEl.classList.remove('maxed');
    holdMs = 0;
    holdProgress = 0;
  }
}

function drawHoldRing() {
  if (holdProgress <= 0 || bubbleState === 'popping') return;
  const r  = bubbleEl.getBoundingClientRect();
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;
  const radius = r.width / 2 + 12;

  fxCtx.save();
  fxCtx.strokeStyle = `hsl(${195 - holdProgress * 55}, ${90 - holdProgress * 15}%, ${60 + holdProgress * 30}%)`;
  fxCtx.lineWidth = 5;
  fxCtx.lineCap = 'round';
  fxCtx.globalAlpha = 0.55 + holdProgress * 0.45;
  fxCtx.beginPath();
  fxCtx.arc(cx, cy, radius, -Math.PI / 2, -Math.PI / 2 + holdProgress * Math.PI * 2);
  fxCtx.stroke();
  fxCtx.restore();
}

// ── Pinwheel state ─────────────────────────────────────────────
const WHEEL_DRAG          = 0.94;
const WHEEL_MAX_SPEED     = 22;   // deg/frame terminal velocity
const WHEEL_LERP          = 0.08; // approach factor
const CELEBRATION_SPEED   = 8;    // deg/frame to trigger party
const CELEBRATION_MS      = 700;  // sustain needed

let wheelAngle    = 0;
let wheelSpeed    = 0;
let pinwheelState = 'idle';  // idle | celebrating
let fastMs        = 0;

function resetPinwheel() {
  wheelSpeed    = 0;
  pinwheelState = 'idle';
  fastMs        = 0;
  pinwheelSvg.style.filter = '';
}

function spawnSparkle(cx, cy) {
  const angle = Math.random() * Math.PI * 2;
  const speed = Math.random() * 6 + 2;
  particles.push({
    x: cx + (Math.random() - 0.5) * 24,
    y: cy + (Math.random() - 0.5) * 24,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - 2,
    color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
    w: Math.random() * 8 + 3,
    h: Math.random() * 5 + 2,
    rot:   Math.random() * 360,
    rotV:  (Math.random() - 0.5) * 18,
    alpha: 1,
    decay: Math.random() * 0.025 + 0.018,  // fast decay — sparkler feel
    gravity: 0.18,
  });
}

function updatePinwheel(dt, blowing, rmsLevel) {
  if (pinwheelState === 'celebrating') return;

  if (blowing) {
    const target = Math.min(((rmsLevel - 0.030) / 0.07) * WHEEL_MAX_SPEED, WHEEL_MAX_SPEED);
    wheelSpeed += (target - wheelSpeed) * WHEEL_LERP;
  } else {
    wheelSpeed *= WHEEL_DRAG;
    if (wheelSpeed < 0.05) wheelSpeed = 0;
  }

  wheelAngle += wheelSpeed;
  pinwheelSvg.style.transform = `rotate(${wheelAngle}deg)`;

  // Glow intensifies as speed climbs
  const t = Math.min(wheelSpeed / WHEEL_MAX_SPEED, 1);
  pinwheelSvg.style.filter = t > 0.1
    ? `drop-shadow(0 0 ${t * 20}px rgba(255,215,0,${t * 0.85}))`
    : '';

  // Continuous sparkles — starts gentle, gets denser as speed rises
  if (wheelSpeed > 0.5) {
    const r   = pinwheelSvg.getBoundingClientRect();
    const cx  = r.left + r.width  / 2;
    const cy  = r.top  + r.height / 2;
    const count = Math.ceil(wheelSpeed / 6);   // 1 sparkle at low speed, up to 4 at max
    for (let i = 0; i < count; i++) spawnSparkle(cx, cy);
  }

  if (wheelSpeed >= CELEBRATION_SPEED) {
    fastMs += dt;
    if (fastMs >= CELEBRATION_MS) celebratePinwheel();
  } else {
    fastMs = 0;
  }
}

function celebratePinwheel() {
  pinwheelState = 'celebrating';
  const r = pinwheelSvg.getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + r.height / 2, 130);
  triggerFlash('celebrate');
  if (window.posthog) posthog.capture('pinwheel_celebrate');

  setTimeout(() => {
    wheelSpeed    = 8;
    fastMs        = 0;
    pinwheelState = 'idle';
  }, 2500);
}

// ── Dandelion state ────────────────────────────────────────
const DAN_SEED_COUNT  = 12;
const DAN_SEED_LENGTHS = [40,36,44,38,42,36,40,44,38,42,36,40];
const DAN_SEED_COLORS  = ['#dde8a0','#e8f4a0','#d0e890','#cce098','#d8eca8'];

const dandelionSvg = document.getElementById('dandelion-svg');
const danCenter    = document.getElementById('dan-center');

let danSeeds       = [];
let danSeedsLeft   = DAN_SEED_COUNT;
let dandelionState = 'idle'; // idle | celebrating | regrowing
let danDetachTimer = 0;

function initDandelion() {
  danSeeds.forEach(s => s.el && s.el.remove());
  danSeeds = [];
  danSeedsLeft   = DAN_SEED_COUNT;
  dandelionState = 'idle';
  danDetachTimer = 0;

  for (let i = 0; i < DAN_SEED_COUNT; i++) {
    const angleRad = (i / DAN_SEED_COUNT) * Math.PI * 2;
    const length   = DAN_SEED_LENGTHS[i];
    const cosA     = Math.cos(angleRad);
    const sinA     = Math.sin(angleRad);
    const tipX     = cosA * length;
    const tipY     = sinA * length;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'dan-seed');
    g.style.transition = 'opacity 0.15s';

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1','0'); line.setAttribute('y1','0');
    line.setAttribute('x2', tipX); line.setAttribute('y2', tipY);
    line.setAttribute('stroke','#9ab060'); line.setAttribute('stroke-width','1.5');
    line.setAttribute('stroke-linecap','round');

    const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circ.setAttribute('cx', tipX); circ.setAttribute('cy', tipY);
    circ.setAttribute('r','6');
    circ.setAttribute('fill', DAN_SEED_COLORS[i % DAN_SEED_COLORS.length]);

    for (let j = 0; j < 4; j++) {
      const a = angleRad + (j - 1.5) * 0.4;
      const fl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      fl.setAttribute('x1', tipX); fl.setAttribute('y1', tipY);
      fl.setAttribute('x2', tipX + Math.cos(a) * 5);
      fl.setAttribute('y2', tipY + Math.sin(a) * 5);
      fl.setAttribute('stroke','#f0f8d0'); fl.setAttribute('stroke-width','1');
      fl.setAttribute('stroke-linecap','round');
      g.appendChild(fl);
    }
    g.appendChild(line);
    g.appendChild(circ);
    dandelionSvg.insertBefore(g, danCenter);
    danSeeds.push({ angleRad, length, el: g, gone: false });
  }
}

function detachSeed() {
  const remaining = danSeeds.filter(s => !s.gone);
  if (!remaining.length) return;
  const seed = remaining[Math.floor(Math.random() * remaining.length)];
  seed.gone = true;
  seed.el.style.opacity = '0';
  danSeedsLeft--;

  const rect  = dandelionSvg.getBoundingClientRect();
  const scale = rect.width / 120;
  const cx    = rect.left + rect.width  / 2;
  const cy    = rect.top  + rect.height / 2;
  const tipX  = cx + Math.cos(seed.angleRad) * seed.length * scale;
  const tipY  = cy + Math.sin(seed.angleRad) * seed.length * scale;

  for (let i = 0; i < 4; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({
      x: tipX + (Math.random() - 0.5) * 8,
      y: tipY + (Math.random() - 0.5) * 8,
      vx: Math.cos(a) * (Math.random() * 1.0 + 0.2) + (Math.random() - 0.5) * 0.5,
      vy: -(Math.random() * 1.6 + 0.4),
      color: DAN_SEED_COLORS[Math.floor(Math.random() * DAN_SEED_COLORS.length)],
      w: Math.random() * 5 + 3, h: Math.random() * 5 + 3,
      rot: Math.random() * 360, rotV: (Math.random() - 0.5) * 3,
      alpha: 0.85, decay: 0.003, gravity: 0.012,
    });
  }

  if (danSeedsLeft === 0) setTimeout(celebrateDandelion, 250);
}

function celebrateDandelion() {
  dandelionState = 'celebrating';
  const rect = dandelionSvg.getBoundingClientRect();
  burst(rect.left + rect.width / 2, rect.top + rect.height / 2, 120);
  triggerFlash('celebrate');

  celTitle.textContent = 'WOW!';
  celSub.textContent   = 'All gone!';
  celebrationEl.classList.remove('show');
  void celebrationEl.offsetWidth;
  celebrationEl.classList.add('show');
  if (window.posthog) posthog.capture('dandelion_complete');

  setTimeout(() => {
    celebrationEl.classList.remove('show');
    dandelionState = 'regrowing';
    setTimeout(() => {
      danSeeds.forEach((s, i) => {
        s.gone = false;
        s.el.style.transition = 'opacity 0.5s';
        s.el.style.opacity = '0';
        setTimeout(() => { s.el.style.opacity = '1'; }, 100 + i * 80);
      });
      danSeedsLeft = DAN_SEED_COUNT;
      setTimeout(() => { dandelionState = 'idle'; danDetachTimer = 0; }, 1400);
    }, 400);
  }, 2000);
}

function updateDandelion(dt, blowing, rms) {
  if (dandelionState !== 'idle' || !blowing || danSeedsLeft === 0) return;
  danDetachTimer -= dt;
  if (danDetachTimer <= 0) {
    detachSeed();
    danDetachTimer = Math.max(100, 380 - ((rms - 0.030) / 0.07) * 280);
  }
}

// ── Candle state ───────────────────────────────────────────
const candleSvg  = document.getElementById('candle-svg');
const flameGroup = document.getElementById('flame-group');

let flameLife   = 1.0;
let candleState = 'idle'; // idle | extinguishing | celebrating | relighting
let smokeTimer  = 0;
const CANDLE_BLOW_RATE = 0.9;  // life lost per second at full blow
const CANDLE_RECOVER   = 0.12; // life gained per second at rest

function resetCandle() {
  flameLife   = 1.0;
  candleState = 'idle';
  smokeTimer  = 0;
  applyFlameLife();
}

function applyFlameLife() {
  const s = Math.max(0, flameLife);
  flameGroup.setAttribute('transform', `scale(1, ${s})`);
  flameGroup.setAttribute('opacity', 0.35 + s * 0.65);
}

function spawnSmoke(cx, cy) {
  particles.push({
    x: cx + (Math.random() - 0.5) * 6,
    y: cy,
    vx: (Math.random() - 0.5) * 0.7,
    vy: -(Math.random() * 1.0 + 0.4),
    color: '#b0b0c0',
    w: Math.random() * 9 + 6, h: Math.random() * 9 + 6,
    rot: 0, rotV: (Math.random() - 0.5) * 1.5,
    alpha: 0.4, decay: 0.004, gravity: -0.008,
    isCircle: true,
  });
}

function extinguishCandle() {
  candleState = 'extinguishing';
  flameGroup.setAttribute('opacity', '0');

  setTimeout(() => {
    const rect = candleSvg.getBoundingClientRect();
    const svgW = rect.width;
    const svgH = rect.height;
    const wickX = rect.left + (0 + 25) / 50 * svgW;
    const wickY = rect.top  + (0 + 45) / 115 * svgH;

    burst(rect.left + svgW / 2, wickY, 100);
    triggerFlash('celebrate');

    celTitle.textContent = 'WOW!';
    celSub.textContent   = 'You blew it out!';
    celebrationEl.classList.remove('show');
    void celebrationEl.offsetWidth;
    celebrationEl.classList.add('show');
    candleState = 'celebrating';
    if (window.posthog) posthog.capture('candle_out');

    setTimeout(() => {
      celebrationEl.classList.remove('show');
      candleState = 'relighting';
      flameLife   = 0;
      let t = 0;
      const id = setInterval(() => {
        t += 0.025;
        flameLife = Math.min(1, t);
        applyFlameLife();
        if (t >= 1) { clearInterval(id); candleState = 'idle'; smokeTimer = 0; }
      }, 40);
    }, 2200);
  }, 500);
}

function updateCandle(dt, blowing, rms) {
  if (candleState === 'extinguishing' || candleState === 'celebrating') {
    smokeTimer += dt;
    if (smokeTimer >= 90) {
      smokeTimer = 0;
      const rect = candleSvg.getBoundingClientRect();
      const wickX = rect.left + (0 + 25) / 50 * rect.width;
      const wickY = rect.top  + (0 + 45) / 115 * rect.height;
      spawnSmoke(wickX, wickY);
    }
    return;
  }
  if (candleState !== 'idle') return;

  // Gentle flicker: tiny sine oscillation on top of base scale
  const flicker = Math.sin(Date.now() / 90) * 0.04;
  const visualLife = Math.max(0, flameLife + flicker);
  flameGroup.setAttribute('transform', `scale(1, ${visualLife})`);
  flameGroup.setAttribute('opacity', 0.35 + visualLife * 0.65);

  if (blowing) {
    const intensity = Math.min((rms - 0.030) / 0.07, 1);
    flameLife -= CANDLE_BLOW_RATE * intensity * (dt / 1000);
  } else {
    flameLife = Math.min(1, flameLife + CANDLE_RECOVER * (dt / 1000));
  }
  flameLife = Math.max(0, Math.min(1, flameLife));
  if (flameLife <= 0) extinguishCandle();
}

// ── Game loop ──────────────────────────────────────────────────
let running = false;
let lastTs  = null;

function gameLoop(ts) {
  if (!running) return;

  const dt = lastTs ? Math.min(ts - lastTs, 50) : 16;
  lastTs = ts;

  analyser.getByteTimeDomainData(dataArray);
  analyser.getByteFrequencyData(freqData);
  smoothedRMS = RMS_SMOOTH * smoothedRMS + (1 - RMS_SMOOTH) * getRMS(dataArray);
  const blowing = isBlowing(smoothedRMS, freqData);
  micDot.classList.toggle('blowing', blowing);

  if      (currentPage === 0) updateBubble(dt, blowing);
  else if (currentPage === 1) updatePinwheel(dt, blowing, smoothedRMS);
  else if (currentPage === 2) updateDandelion(dt, blowing, smoothedRMS);
  else if (currentPage === 3) updateCandle(dt, blowing, smoothedRMS);

  updateParticles();

  if (bubbleState === 'breathing') breatheInMs += dt;

  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  if (currentPage === 0) {
    drawHoldRing();
    if (bubbleState === 'breathing') drawBreatheInRings();
  }
  drawParticles();

  requestAnimationFrame(gameLoop);
}

// ── Mic error guidance ─────────────────────────────────────────
function detectPlatform() {
  const ua  = navigator.userAgent;
  const ios = /iphone|ipad|ipod/i.test(ua);
  const android = /android/i.test(ua);
  const safari  = /safari/i.test(ua) && !/chrome/i.test(ua);
  const chrome  = /chrome/i.test(ua) && !/edg/i.test(ua);
  if (ios && safari) return 'ios-safari';
  if (ios && chrome) return 'ios-chrome';
  if (android)       return 'android';
  if (safari)        return 'mac-safari';
  return 'chrome'; // default for desktop chrome/edge
}

const MIC_GUIDANCE = {
  'ios-safari': {
    steps: [
      'You tapped "Don\'t Allow" — tap <b>Refresh</b> below to try again.',
      'When the mic prompt appears, tap <b>Allow</b>.',
      'Still not working? Open <b>Settings → Safari → Microphone</b> and set it to <b>Allow</b>.',
      'Then come back here and refresh.',
    ],
    note: 'iPhone/iPad · Safari',
  },
  'ios-chrome': {
    steps: [
      'You tapped "Don\'t Allow" — tap <b>Refresh</b> below to try again.',
      'When the mic prompt appears, tap <b>Allow</b>.',
      'Still blocked? Open <b>Settings → Chrome → Microphone</b> and turn it <b>On</b>.',
      'Then come back here and refresh.',
    ],
    note: 'iPhone/iPad · Chrome',
  },
  'android': {
    steps: [
      'Tap <b>Refresh</b> below and allow mic when prompted.',
      'If the prompt doesn\'t appear: tap the <b>🔒 lock icon</b> in the address bar.',
      'Find <b>Microphone</b> and set it to <b>Allow</b>.',
      'Then refresh the page.',
    ],
    note: 'Android',
  },
  'mac-safari': {
    steps: [
      'Click <b>Refresh</b> and allow mic access when asked.',
      'Still blocked? Go to <b>Safari → Settings for This Website</b>.',
      'Set <b>Microphone</b> to <b>Allow</b> and refresh.',
    ],
    note: 'Mac · Safari',
  },
  'chrome': {
    steps: [
      'Click <b>Refresh</b> and allow mic when the browser asks.',
      'Blocked by mistake? Click the <b>🔒 lock icon</b> in the address bar.',
      'Set <b>Microphone</b> to <b>Allow</b> and refresh.',
    ],
    note: 'Desktop browser',
  },
};

function showMicError() {
  const platform = detectPlatform();
  const guide = MIC_GUIDANCE[platform] || MIC_GUIDANCE['chrome'];

  micSteps.innerHTML = guide.steps.map(s => `<li>${s}</li>`).join('');
  platformNote.textContent = guide.note;
  micError.classList.add('visible');
  retryBtn.style.display = 'block';
}

retryBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  micError.classList.remove('visible');
  retryBtn.style.display = 'none';
  tryStart();
});

// ── Start ──────────────────────────────────────────────────────
async function tryStart() {
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch {
    showMicError();
    return;
  }

  const ctx    = new (window.AudioContext || window.webkitAudioContext)();
  await ctx.resume();
  const source = ctx.createMediaStreamSource(stream);
  analyser     = ctx.createAnalyser();
  analyser.fftSize = 512;
  dataArray = new Uint8Array(analyser.fftSize);
  freqData  = new Uint8Array(analyser.frequencyBinCount);
  source.connect(analyser);

  overlay.classList.add('hidden');
  statusBar.classList.add('visible');
  micHint.classList.add('show');
  setTimeout(() => swipeHint.classList.add('hidden'), 5000);

  running = true;
  requestAnimationFrame(gameLoop);
}

overlay.addEventListener('click', tryStart);
overlay.addEventListener('touchstart', e => {
  if (e.target === retryBtn) return;
  e.preventDefault();
  tryStart();
}, { passive: false });
</script>
